spring.application.name=com.notification-service
server.port=8083
#email------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
#tls encrypton enabled

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Twilio (hidden)
twilio.account.sid=${TWILIO_SID}
twilio.auth.token=${TWILIO_TOKEN}
twilio.phone.number=${TWILIO_PHONE}
twilio.whatsapp.number=${TWILIO_WHATSAPP}


booking.service.url=http://localhost:7076


#consumer-kafka connection
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-group-test
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer