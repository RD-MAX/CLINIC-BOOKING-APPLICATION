spring.application.name=booking-service
server.port=7076

#database
spring.datasource.url=jdbc:mysql://localhost:3306/booking_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

#hibernate
spring.jpa.hibernate.ddl-auto=update

#kafka connection-producer
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

booking.service.url=http://localhost:7076
doctor.service.url=http://localhost:7079
notification.service.url=http://localhost:8083
patient.service.url=http://localhost:7077